<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChunkFlow - 文档解析与切片</title>
    <link rel="stylesheet" href="/static/style.css?v=quality-monitor-1">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-inner">
                <h1 class="logo">ChunkFlow</h1>
                <span class="subtitle">文档解析与智能切片</span>
                <span id="parserBadge" class="badge"></span>
            </div>
        </header>

        <main class="main">
            <section class="upload-section">
                <div class="upload-card" id="dropZone">
                    <div class="upload-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                    </div>
                    <p class="upload-text">拖拽文件到此处，或点击选择文件</p>
                    <p class="upload-hint">支持 PDF / CSV / TSV / XLSX / TXT / Markdown</p>
                    <input type="file" id="fileInput" accept=".pdf,.csv,.tsv,.xlsx,.xlsm,.txt,.md,.markdown" hidden>
                </div>

                <div class="params-row">
                    <div class="param-group">
                        <label for="parserMode">Parser</label>
                        <select id="parserMode">
                            <option value="auto" selected>Auto (Docling first)</option>
                            <option value="docling">Docling</option>
                            <option value="mineru">MinerU tables</option>
                            <option value="pypdf">PyPDF</option>
                            <option value="table_file">Table file</option>
                            <option value="text_file">Text file</option>
                        </select>
                    </div>
                    <div class="param-group">
                        <label for="maxTokens">Max Tokens</label>
                        <input type="number" id="maxTokens" value="400" min="50" max="2000" step="50">
                    </div>
                    <div class="param-group">
                        <label for="chunkSize">Chunk Size</label>
                        <input type="number" id="chunkSize" value="400" min="50" max="2000" step="50">
                    </div>
                    <div class="param-group">
                        <label for="overlap">Overlap Tokens</label>
                        <input type="number" id="overlap" value="100" min="0" max="500" step="10">
                    </div>
                    <div class="param-group">
                        <label for="minChunkTokens">最小块阈值</label>
                        <input type="number" id="minChunkTokens" value="50" min="0" max="500" step="10" title="低于该 token 数的小块会合并到相邻同 section 块中，设为 0 禁用">
                    </div>
                    <button id="parseBtn" class="btn-primary" disabled>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                        </svg>
                        解析文档
                    </button>
                </div>

                <div id="fileInfo" class="file-info" hidden>
                    <span id="fileName" class="file-name"></span>
                    <span id="fileSize" class="file-size"></span>
                    <button id="clearFile" class="btn-text">清除</button>
                </div>
            </section>

            <div id="loading" class="loading" hidden>
                <div class="spinner"></div>
                <p>正在解析文档，请稍候...</p>
            </div>

            <div id="errorMsg" class="error-msg" hidden></div>

            <section id="results" class="results-section" hidden>
                <div class="results-header">
                    <div class="results-summary">
                        <h2>解析结果</h2>
                        <div class="stats">
                            <div class="stat">
                                <span class="stat-value" id="statChunks">0</span>
                                <span class="stat-label">Chunks</span>
                            </div>
                            <div class="stat">
                                <span class="stat-value" id="statParser">-</span>
                                <span class="stat-label">解析器</span>
                            </div>
                            <div class="stat">
                                <span class="stat-value" id="statSize">-</span>
                                <span class="stat-label">文件大小</span>
                            </div>
                        </div>
                    </div>
                    <div class="results-actions">
                        <input type="text" id="searchInput" placeholder="搜索 chunk 内容..." class="search-input">
                        <button id="exportBtn" class="btn-secondary">导出 JSON</button>
                    </div>
                </div>

                <div class="view-tabs" role="tablist" aria-label="结果视图">
                    <button id="chunksTab" class="view-tab active" type="button">切片结果</button>
                    <button id="monitorTab" class="view-tab" type="button">质量监控</button>
                </div>

                <div id="qualityPanel" class="quality-panel" hidden></div>
                <div id="chunksView">
                    <div id="chunkList" class="chunk-list"></div>
                </div>
                <div id="monitorView" class="monitor-view" hidden>
                    <div id="monitorPanel"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/app.js?v=quality-monitor-1"></script>
</body>
</html>
